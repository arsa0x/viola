[package]
name = "viola"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
chrono = "0.4.44"
dirs = "6.0.0"
env_logger = "0.11.10"
futures = "0.3.32"
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
inventory = "0.3.24"
isahc = { version = "1.8.2", features = ["cookies", "json"] }
log = "0.4.29"
macros = { path = "src/macros" }
moka = { version = "0.12.15", features = ["future"] }
once_cell = "1.21.4"
qrcode = "0.14.1"
scraper = "0.27.0"
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.48", features = ["macros", "rt-multi-thread"] }
toml = "1.1.2"
url = "2.5.8"
urlencoding = "2.1.3"
wacore = { version = "0.6", default-features = false }
waproto = "0.6"
webp = "0.3.1"
whatsapp-rust = { version = "0.6", default-features = false, features = [
  "moka-cache",
  "signal",
  "sqlite-storage",
  "tokio-native",
  "tokio-runtime",
  "tokio-transport",
  "ureq-client",
] }
whatsapp-rust-sqlite-storage = "0.6"
whatsapp-rust-tokio-transport = "0.6"
whatsapp-rust-ureq-http-client = "0.6"

[build-dependencies]
walkdir = "2"

[profile.release]
opt-level = "z"
strip = true
lto = true
panic = "abort"
codegen-units = 1
