[workspace]
resolver = "2"
members = ["viola_commands/", "viola_core/", "viola_macros/"]

[workspace.dependencies]
anyhow = "1.0.102"
dashmap = "6.1.0"
dirs = "6.0.0"
futures = "0.3.32"
inventory = "0.3.24"
isahc = { version = "1.8.2", features = ["cookies", "json"] }
moka = { version = "0.12.15", features = ["future"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.48", features = ["macros", "rt-multi-thread"] }
toml = "1.1.2"
viola_commands = { path = "viola_commands/" }
viola_core = { path = "viola_core/" }
viola_macros = { path = "viola_macros" }
wacore = { version = "0.6", default-features = false }
waproto = "0.6"
whatsapp-rust = { version = "0.6", default-features = false, features = [
  "moka-cache",
  "signal",
  "sqlite-storage",
  "tokio-native",
  "tokio-runtime",
  "tokio-transport",
  "ureq-client",
] }
whatsapp-rust-sqlite-storage = "0.6"
whatsapp-rust-tokio-transport = "0.6"
whatsapp-rust-ureq-http-client = "0.6"

[profile.release]
opt-level = "z"
strip = true
lto = true
panic = "abort"
codegen-units = 1
