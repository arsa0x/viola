name: Release Viola

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: viola-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: viola-windows-x86_64.exe

          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: viola-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Binary
        shell: bash
        run: |
          mkdir dist

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/viola.exe dist/${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/viola dist/${{ matrix.binary_name }}
          fi

      - name: Upload Release Binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
